<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woolland Handicraft</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(to right, #fdfbfb, #ebedee);
}

/* HEADER */
header {
  background: linear-gradient(45deg,#ff7e5f,#feb47b);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header img {height:50px;}

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}
nav a:hover {color:#222;}

/* SECTION */
.section {
  padding:30px;
  text-align:center;
}
h2 {
  color:#ff7e5f;
}

/* SLIDER */
.slider {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:15px;
}
.slider img {
  height:200px;
  border-radius:15px;
}

/* STAFF */
.staff {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
.staff img {
  width:150px;
  border-radius:15px;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:white;
  border-radius:15px;
  padding:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
}
.card img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
button {
  background: linear-gradient(45deg,#ff7e5f,#ff5e3a);
  color:white;
  border:none;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  cursor:pointer;
}
button:hover {
  opacity:0.8;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
#popupContent {
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:300px;
}

/* CART */
#cartBox {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
}

/* FOOTER */
footer {
  background:#222;
  color:white;
  text-align:center;
  padding:15px;
}
</style>

</head>

<body>

<header>
  <img src="https://via.placeholder.com/150">
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#about">About</a>
    <a href="#why">Why Us</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- SLIDER -->
<div class="slider">
  <img src="https://via.placeholder.com/300">
  <img src="https://via.placeholder.com/300">
  <img src="https://via.placeholder.com/300">
</div>

<!-- STAFF -->
<div class="section">
  <h2>Our Team</h2>
  <div class="staff">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
  </div>
</div>

<!-- PRODUCTS -->
<div class="section" id="products">
<h2>Our Products</h2>

<div class="products">

<div class="card" onclick="openProduct('Wool Hat','700','https://via.placeholder.com/300')">
<img src="https://via.placeholder.com/300">
<h3>Wool Hat</h3>
<p>Rs 700</p>
<button onclick="addToCart(event,'Wool Hat','700')">Add to Cart</button>
</div>

<div class="card" onclick="openProduct('Handmade Bag','1200','https://via.placeholder.com/300')">
<img src="https://via.placeholder.com/300">
<h3>Handmade Bag</h3>
<p>Rs 1200</p>
<button onclick="addToCart(event,'Handmade Bag','1200')">Add to Cart</button>
</div>

</div>
</div>

<!-- ABOUT -->
<div class="section" id="about">
<h2>About Us</h2>
<p>We create colorful handmade wool products from Nepal.</p>
</div>

<!-- WHY -->
<div class="section" id="why">
<h2>Why Choose Us</h2>
<p>High quality, handmade, trusted by customers.</p>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
<h2>Contact</h2>
<p>Phone: 98XXXXXXXX</p>
</div>

<footer>
© 2026 Woolland Handicraft
</footer>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
  <div id="popupContent">
    <img id="pImg" width="100%">
    <h3 id="pName"></h3>
    <p id="pPrice"></p>
  </div>
</div>

<!-- CART -->
<div id="cartBox" onclick="checkout()">🛒</div>

<script>
let cart=[];

function addToCart(e,name,price){
e.stopPropagation();
cart.push({name,price});
alert(name+" added to cart");
}

function openProduct(name,price,img){
document.getElementById("popup").style.display="flex";
document.getElementById("pName").innerText=name;
document.getElementById("pPrice").innerText="Rs "+price;
document.getElementById("pImg").src=img;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function checkout(){
let msg="I want to order:%0A";
cart.forEach(p=>{msg+=p.name+" Rs "+p.price+"%0A";});
window.open("https://wa.me/977XXXXXXXXXX?text="+msg);
}
</script>

</body>
</html>
